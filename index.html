<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles/style.css" />
  <link rel="stylesheet" href="./styles/debug-table.css" />
  <link rel="stylesheet" href="./styles/toast.css" />
  <title>3DGS Renderer</title>
</head>

<body>
  <div id="toast-container"></div>

  <div id="main-layout">

    <div class="workspace active" id="workspace-render">
      <div id="left-panel">
        <div class="panel" id="canvas-wrapper">
          <div id="fallback-message" style="display: none; padding: 2em; font-family: monospace; color: red;">
            <p>WebGPU is not supported in this browser.</p>
            <a href="https://caniuse.com/webgpu" target="_blank" rel="noopener">
              Check WebGPU support &#8594;
            </a>
          </div>
          <canvas id="gfx-main"></canvas>
          <div id="tileGridOverlay"></div>
          <div id="fps-counter">fps: <span id="fps"></span></div>
        </div>
      </div>

      <div id="right-panel">
        <div class="panel" id="controls-panel">

          <div class="controls-container">
            <label for="file-input">Load File:</label>
            <input type="file" id="file-input" accept=".laz,.las" />
          </div>

          <div id="debug" class="debug-controls">

            <div class="input-group" id="tileSizeInputs">
              <label>Tile size X (px): <input type="number" id="tileSizeX" value="16" step="1" min="1" max="256"></label>
              <label>Tile size Y (px): <input type="number" id="tileSizeY" value="16" step="1" min="1" max="256"></label>
            </div>

            <div class="input-group">
              <label>Splat draw mode:
                <select id="splatDrawMode">
                  <option value="0">Normal</option>
                  <option value="1">Splats per tile</option>
                </select>
              </label>
            </div>

            <div class="input-group toggles">
              <label><input type="checkbox" id="renderGrid" checked>Render Grid</label>
              <label><input type="checkbox" id="renderSplats" checked>Render Splats</label>
              <label><input type="checkbox" id="rebinEveryFrame" title="Force re-binning every frame for profiling purposes. If unchecked, re-binning only occurs when the camera moves or the number of splats changes.">Rebin every frame (profiling)</label>
            </div>
          </div>

        </div>
        <div class="panel" id="profiler-panel">
          <div>
            <div id="gpu-mem">Buffers Total: -- MB</div>
            <div id="buffer-toggle">&#x25B6; Show Buffers</div>
            <div id="buffer-list"></div>
          </div>
          <div id="gpu-timers" style="margin-top: 1em;">
            <div id="gpu-timer-title" style="margin-bottom: 0.5em;">Shader Timings</div>
            <table id="gpu-timer-table" style="width: 100%; font-family: monospace; color: #ccc;">
              <thead>
                <tr style="text-align: left;">
                  <th id="gpu-timer-th-shader">Shader<span id="gpu-timer-arrow-shader"></span></th>
                  <th id="gpu-timer-th-time" style="text-align: right;">Time (µs)<span id="gpu-timer-arrow-time"></span></th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  </div>


  <script type="module" src="src/main.ts"></script>
</body>


</html>
